<svg xmlns="http://www.w3.org/2000/svg" width="1400" height="920" viewBox="0 0 1400 920" role="img" aria-labelledby="title desc">
  <title id="title">AI Coach Overview</title>
  <desc id="desc">A report style overview image showing the major regions of the AI Coach and AI Interview page in Talent IQ.</desc>
  <rect width="1400" height="920" rx="28" fill="#f0fdf4"/>
  <rect x="40" y="40" width="1320" height="80" rx="20" fill="#ffffff" stroke="#86efac" stroke-width="2"/>
  <text x="90" y="90" font-size="30" font-family="Arial, sans-serif" font-weight="700" fill="#14532d">Talent IQ AI Coach Studio</text>
  <text x="1045" y="90" font-size="18" font-family="Arial, sans-serif" fill="#15803d">Protected intelligent interview-prep workspace</text>

  <rect x="60" y="150" width="320" height="720" rx="28" fill="#14532d"/>
  <text x="95" y="200" font-size="26" font-family="Arial, sans-serif" font-weight="700" fill="#ffffff">Control Panel</text>
  <rect x="90" y="235" width="260" height="66" rx="18" fill="#166534"/>
  <text x="125" y="276" font-size="22" font-family="Arial, sans-serif" fill="#dcfce7">Coach / Interview</text>
  <rect x="90" y="330" width="260" height="90" rx="18" fill="#166534"/>
  <text x="115" y="365" font-size="19" font-family="Arial, sans-serif" fill="#dcfce7">Topic Input</text>
  <text x="115" y="395" font-size="16" font-family="Arial, sans-serif" fill="#bbf7d0">DSA, React, System Design...</text>
  <rect x="90" y="445" width="260" height="78" rx="18" fill="#166534"/>
  <text x="115" y="488" font-size="19" font-family="Arial, sans-serif" fill="#dcfce7">Difficulty Selector</text>
  <rect x="90" y="555" width="260" height="70" rx="18" fill="#22c55e"/>
  <text x="145" y="599" font-size="23" font-family="Arial, sans-serif" font-weight="700" fill="#052e16">Start Interview</text>
  <rect x="90" y="646" width="260" height="76" rx="18" fill="#0f3b2e" stroke="#4ade80" stroke-width="2"/>
  <text x="118" y="690" font-size="21" font-family="Arial, sans-serif" fill="#d1fae5">Explain As Live Stream</text>
  <rect x="90" y="750" width="260" height="86" rx="20" fill="#0f3b2e" stroke="#4ade80" stroke-width="2"/>
  <text x="115" y="792" font-size="19" font-family="Arial, sans-serif" fill="#ecfdf5">Mode Status</text>
  <text x="115" y="820" font-size="16" font-family="Arial, sans-serif" fill="#bbf7d0">Chat mode or live stream mode</text>

  <rect x="420" y="150" width="920" height="340" rx="28" fill="#ffffff" stroke="#86efac" stroke-width="2"/>
  <text x="460" y="200" font-size="28" font-family="Arial, sans-serif" font-weight="700" fill="#14532d">AI Coach Chat Area</text>
  <text x="460" y="235" font-size="18" font-family="Arial, sans-serif" fill="#4b5563">User asks questions, receives streamed answers, and can speak through the microphone.</text>
  <rect x="460" y="275" width="380" height="78" rx="20" fill="#ecfdf5"/>
  <text x="490" y="320" font-size="19" font-family="Arial, sans-serif" fill="#14532d">Assistant message bubble</text>
  <rect x="930" y="370" width="320" height="78" rx="20" fill="#22c55e"/>
  <text x="1000" y="415" font-size="19" font-family="Arial, sans-serif" fill="#052e16">User answer bubble</text>
  <rect x="460" y="385" width="300" height="34" rx="14" fill="#d1fae5"/>
  <text x="485" y="408" font-size="15" font-family="Arial, sans-serif" fill="#166534">Mic ready | Voice enabled | Provider visible</text>

  <rect x="420" y="525" width="560" height="345" rx="28" fill="#062b22"/>
  <text x="455" y="575" font-size="28" font-family="Arial, sans-serif" font-weight="700" fill="#ecfdf5">Live Transcript Panel</text>
  <text x="455" y="610" font-size="18" font-family="Arial, sans-serif" fill="#bbf7d0">Streams response chunks in real time for teaching or interview feedback.</text>
  <rect x="455" y="645" width="490" height="170" rx="22" fill="#0f3b2e" stroke="#4ade80" stroke-width="2"/>
  <text x="485" y="695" font-size="20" font-family="Arial, sans-serif" fill="#ecfdf5">Communication, Basic Knowledge,</text>
  <text x="485" y="728" font-size="20" font-family="Arial, sans-serif" fill="#ecfdf5">Improvements, and Next Question</text>
  <text x="485" y="765" font-size="17" font-family="Arial, sans-serif" fill="#bbf7d0">or direct teaching explanation in coach mode</text>

  <rect x="1010" y="525" width="330" height="345" rx="28" fill="#ffffff" stroke="#86efac" stroke-width="2"/>
  <text x="1050" y="575" font-size="28" font-family="Arial, sans-serif" font-weight="700" fill="#14532d">AI Avatar Tile</text>
  <rect x="1050" y="610" width="250" height="180" rx="28" fill="#dcfce7"/>
  <circle cx="1175" cy="680" r="58" fill="#22c55e"/>
  <rect x="1115" y="735" width="120" height="26" rx="13" fill="#14532d"/>
  <text x="1080" y="820" font-size="17" font-family="Arial, sans-serif" fill="#4b5563">Optional Simli-powered live AI presence</text>
</svg>

  <text x="290" y="755" font-size="17" font-family="Arial, sans-serif" fill="#475569">Speech and stream support</text>

  <rect x="825" y="600" width="330" height="230" rx="24" fill="#ffffff" stroke="#c7d2fe" stroke-width="2"/>
  <text x="875" y="655" font-size="24" font-family="Arial, sans-serif" font-weight="700" fill="#1f2937">Resume Checker</text>
  <text x="875" y="695" font-size="17" font-family="Arial, sans-serif" fill="#475569">DOCX extraction</text>
  <text x="875" y="725" font-size="17" font-family="Arial, sans-serif" fill="#475569">Evidence-based review</text>

<svg xmlns="http://www.w3.org/2000/svg" width="1400" height="900" viewBox="0 0 1400 900" role="img" aria-labelledby="title desc">
  <title id="title">Authentication Login Flow</title>
  <desc id="desc">Flow diagram showing Talent IQ login from Clerk to MongoDB user creation and protected route access.</desc>
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#eff6ff"/>
      <stop offset="100%" stop-color="#dbeafe"/>
    </linearGradient>
    <linearGradient id="card" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#f8fafc"/>
    </linearGradient>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#2563eb"/>
    </marker>
  </defs>
  <rect width="1400" height="900" rx="28" fill="url(#bg)"/>
  <text x="700" y="58" text-anchor="middle" font-size="34" font-family="Arial, sans-serif" font-weight="700" fill="#0f172a">Talent IQ Login Authentication Flow</text>
  <text x="700" y="92" text-anchor="middle" font-size="18" font-family="Arial, sans-serif" fill="#334155">From frontend sign-in to MongoDB user mapping and protected access</text>

  <rect x="80" y="170" width="220" height="110" rx="22" fill="url(#card)" stroke="#93c5fd" stroke-width="2"/>
  <text x="190" y="212" text-anchor="middle" font-size="24" font-family="Arial, sans-serif" font-weight="700" fill="#1e3a8a">User Opens App</text>
  <text x="190" y="242" text-anchor="middle" font-size="16" font-family="Arial, sans-serif" fill="#475569">Public page loads</text>
  <text x="190" y="265" text-anchor="middle" font-size="16" font-family="Arial, sans-serif" fill="#475569">with Clerk provider</text>

  <rect x="350" y="170" width="220" height="110" rx="22" fill="url(#card)" stroke="#60a5fa" stroke-width="2"/>
  <text x="460" y="212" text-anchor="middle" font-size="24" font-family="Arial, sans-serif" font-weight="700" fill="#1d4ed8">Clerk Sign-In</text>
  <text x="460" y="242" text-anchor="middle" font-size="16" font-family="Arial, sans-serif" fill="#475569">Identity is verified</text>
  <text x="460" y="265" text-anchor="middle" font-size="16" font-family="Arial, sans-serif" fill="#475569">and session starts</text>

  <rect x="620" y="170" width="220" height="110" rx="22" fill="url(#card)" stroke="#38bdf8" stroke-width="2"/>
  <text x="730" y="212" text-anchor="middle" font-size="24" font-family="Arial, sans-serif" font-weight="700" fill="#0369a1">React Auth State</text>
  <text x="730" y="242" text-anchor="middle" font-size="16" font-family="Arial, sans-serif" fill="#475569">isSignedIn, user,</text>
  <text x="730" y="265" text-anchor="middle" font-size="16" font-family="Arial, sans-serif" fill="#475569">and token become available</text>

  <rect x="890" y="170" width="220" height="110" rx="22" fill="url(#card)" stroke="#22c55e" stroke-width="2"/>
  <text x="1000" y="212" text-anchor="middle" font-size="24" font-family="Arial, sans-serif" font-weight="700" fill="#166534">Protected Route</text>
  <text x="1000" y="242" text-anchor="middle" font-size="16" font-family="Arial, sans-serif" fill="#475569">RequireAuth checks</text>
  <text x="1000" y="265" text-anchor="middle" font-size="16" font-family="Arial, sans-serif" fill="#475569">whether access is allowed</text>

  <rect x="1160" y="170" width="180" height="110" rx="22" fill="url(#card)" stroke="#86efac" stroke-width="2"/>
  <text x="1250" y="212" text-anchor="middle" font-size="24" font-family="Arial, sans-serif" font-weight="700" fill="#166534">API Call</text>
  <text x="1250" y="242" text-anchor="middle" font-size="16" font-family="Arial, sans-serif" fill="#475569">Axios adds token</text>
  <text x="1250" y="265" text-anchor="middle" font-size="16" font-family="Arial, sans-serif" fill="#475569">and dev headers</text>

  <rect x="250" y="420" width="260" height="125" rx="24" fill="url(#card)" stroke="#f59e0b" stroke-width="2"/>
  <text x="380" y="465" text-anchor="middle" font-size="24" font-family="Arial, sans-serif" font-weight="700" fill="#92400e">protectRoute</text>
  <text x="380" y="495" text-anchor="middle" font-size="16" font-family="Arial, sans-serif" fill="#57534e">Reads auth context</text>
  <text x="380" y="518" text-anchor="middle" font-size="16" font-family="Arial, sans-serif" fill="#57534e">and gets clerkId</text>

  <rect x="570" y="420" width="260" height="125" rx="24" fill="url(#card)" stroke="#fb7185" stroke-width="2"/>
  <text x="700" y="465" text-anchor="middle" font-size="24" font-family="Arial, sans-serif" font-weight="700" fill="#be123c">MongoDB Lookup</text>
  <text x="700" y="495" text-anchor="middle" font-size="16" font-family="Arial, sans-serif" fill="#57534e">Find user by unique</text>
  <text x="700" y="518" text-anchor="middle" font-size="16" font-family="Arial, sans-serif" fill="#57534e">clerkId</text>

  <rect x="890" y="420" width="260" height="125" rx="24" fill="url(#card)" stroke="#a78bfa" stroke-width="2"/>
  <text x="1020" y="465" text-anchor="middle" font-size="24" font-family="Arial, sans-serif" font-weight="700" fill="#6d28d9">Create or Update</text>
  <text x="1020" y="495" text-anchor="middle" font-size="16" font-family="Arial, sans-serif" fill="#57534e">Insert user if absent</text>
  <text x="1020" y="518" text-anchor="middle" font-size="16" font-family="Arial, sans-serif" fill="#57534e">or fill missing fields</text>

  <rect x="430" y="670" width="540" height="130" rx="28" fill="#ecfeff" stroke="#06b6d4" stroke-width="2"/>
  <text x="700" y="718" text-anchor="middle" font-size="28" font-family="Arial, sans-serif" font-weight="700" fill="#0f766e">Verified Request User Context</text>
  <text x="700" y="748" text-anchor="middle" font-size="18" font-family="Arial, sans-serif" fill="#334155">req.user is attached to the request and used by controllers</text>
  <text x="700" y="774" text-anchor="middle" font-size="18" font-family="Arial, sans-serif" fill="#334155">for sessions, AI routes, chat access, and ownership-based actions</text>

  <line x1="300" y1="225" x2="350" y2="225" stroke="#2563eb" stroke-width="4" marker-end="url(#arrow)"/>
  <line x1="570" y1="225" x2="620" y2="225" stroke="#2563eb" stroke-width="4" marker-end="url(#arrow)"/>
  <line x1="840" y1="225" x2="890" y2="225" stroke="#2563eb" stroke-width="4" marker-end="url(#arrow)"/>
  <line x1="1110" y1="225" x2="1160" y2="225" stroke="#2563eb" stroke-width="4" marker-end="url(#arrow)"/>
  <line x1="1250" y1="280" x2="1030" y2="420" stroke="#2563eb" stroke-width="4" marker-end="url(#arrow)"/>
  <line x1="1110" y1="480" x2="1150" y2="480" stroke="#2563eb" stroke-width="4" marker-end="url(#arrow)" opacity="0"/>
  <line x1="510" y1="482" x2="570" y2="482" stroke="#2563eb" stroke-width="4" marker-end="url(#arrow)"/>
  <line x1="830" y1="482" x2="890" y2="482" stroke="#2563eb" stroke-width="4" marker-end="url(#arrow)"/>
  <line x1="700" y1="545" x2="700" y2="670" stroke="#2563eb" stroke-width="4" marker-end="url(#arrow)"/>
</svg>

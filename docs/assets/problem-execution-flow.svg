<svg xmlns="http://www.w3.org/2000/svg" width="1400" height="900" viewBox="0 0 1400 900" role="img" aria-labelledby="title desc">
  <title id="title">Problem Execution Flow</title>
  <desc id="desc">Diagram showing code run flow from the editor to backend execution and result comparison.</desc>
  <defs>
    <linearGradient id="bg2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#fff7ed" />
      <stop offset="100%" stop-color="#ffedd5" />
    </linearGradient>
    <linearGradient id="box2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ffffff" />
      <stop offset="100%" stop-color="#fff7ed" />
    </linearGradient>
    <marker id="arrow2" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#ea580c" />
    </marker>
  </defs>

  <rect width="1400" height="900" fill="url(#bg2)" rx="28" />
  <text x="700" y="60" text-anchor="middle" font-size="34" font-family="Arial, sans-serif" font-weight="700" fill="#7c2d12">
    Code Execution and Evaluation Flow
  </text>
  <text x="700" y="92" text-anchor="middle" font-size="18" font-family="Arial, sans-serif" fill="#7c2d12">
    How a submitted solution is executed, checked, and reported
  </text>

  <rect x="100" y="180" width="220" height="110" rx="22" fill="url(#box2)" stroke="#fdba74" stroke-width="2" />
  <text x="210" y="222" text-anchor="middle" font-size="23" font-family="Arial, sans-serif" font-weight="700" fill="#9a3412">User Code</text>
  <text x="210" y="252" text-anchor="middle" font-size="16" font-family="Arial, sans-serif" fill="#57534e">Solution written in</text>
  <text x="210" y="275" text-anchor="middle" font-size="16" font-family="Arial, sans-serif" fill="#57534e">JavaScript, Python, or Java</text>

  <rect x="390" y="180" width="220" height="110" rx="22" fill="url(#box2)" stroke="#fb923c" stroke-width="2" />
  <text x="500" y="222" text-anchor="middle" font-size="23" font-family="Arial, sans-serif" font-weight="700" fill="#9a3412">Run Action</text>
  <text x="500" y="252" text-anchor="middle" font-size="16" font-family="Arial, sans-serif" fill="#57534e">Frontend triggers</text>
  <text x="500" y="275" text-anchor="middle" font-size="16" font-family="Arial, sans-serif" fill="#57534e">execution request</text>

  <rect x="680" y="180" width="220" height="110" rx="22" fill="url(#box2)" stroke="#f97316" stroke-width="2" />
  <text x="790" y="222" text-anchor="middle" font-size="23" font-family="Arial, sans-serif" font-weight="700" fill="#9a3412">Frontend API</text>
  <text x="790" y="252" text-anchor="middle" font-size="16" font-family="Arial, sans-serif" fill="#57534e">Language and source</text>
  <text x="790" y="275" text-anchor="middle" font-size="16" font-family="Arial, sans-serif" fill="#57534e">sent to backend</text>

  <rect x="970" y="180" width="220" height="110" rx="22" fill="url(#box2)" stroke="#ea580c" stroke-width="2" />
  <text x="1080" y="222" text-anchor="middle" font-size="23" font-family="Arial, sans-serif" font-weight="700" fill="#9a3412">Backend Route</text>
  <text x="1080" y="252" text-anchor="middle" font-size="16" font-family="Arial, sans-serif" fill="#57534e">Request validation and</text>
  <text x="1080" y="275" text-anchor="middle" font-size="16" font-family="Arial, sans-serif" fill="#57534e">language mapping</text>

  <rect x="540" y="380" width="320" height="120" rx="24" fill="#fffbeb" stroke="#f59e0b" stroke-width="2" />
  <text x="700" y="425" text-anchor="middle" font-size="24" font-family="Arial, sans-serif" font-weight="700" fill="#92400e">Execution Provider</text>
  <text x="700" y="455" text-anchor="middle" font-size="16" font-family="Arial, sans-serif" fill="#57534e">Backend forwards code to remote runner</text>
  <text x="700" y="478" text-anchor="middle" font-size="16" font-family="Arial, sans-serif" fill="#57534e">and receives output, error, or status</text>

  <rect x="160" y="610" width="250" height="130" rx="24" fill="#ecfccb" stroke="#84cc16" stroke-width="2" />
  <text x="285" y="655" text-anchor="middle" font-size="24" font-family="Arial, sans-serif" font-weight="700" fill="#3f6212">Execution Success</text>
  <text x="285" y="685" text-anchor="middle" font-size="16" font-family="Arial, sans-serif" fill="#4d7c0f">Program output returned</text>
  <text x="285" y="708" text-anchor="middle" font-size="16" font-family="Arial, sans-serif" fill="#4d7c0f">to the problem page</text>

  <rect x="470" y="610" width="250" height="130" rx="24" fill="#eff6ff" stroke="#60a5fa" stroke-width="2" />
  <text x="595" y="655" text-anchor="middle" font-size="24" font-family="Arial, sans-serif" font-weight="700" fill="#1d4ed8">Normalization</text>
  <text x="595" y="685" text-anchor="middle" font-size="16" font-family="Arial, sans-serif" fill="#334155">Trim lines and spacing</text>
  <text x="595" y="708" text-anchor="middle" font-size="16" font-family="Arial, sans-serif" fill="#334155">before comparison</text>

  <rect x="780" y="610" width="250" height="130" rx="24" fill="#f5f3ff" stroke="#a78bfa" stroke-width="2" />
  <text x="905" y="655" text-anchor="middle" font-size="24" font-family="Arial, sans-serif" font-weight="700" fill="#6d28d9">Expected Output</text>
  <text x="905" y="685" text-anchor="middle" font-size="16" font-family="Arial, sans-serif" fill="#475569">Language-specific</text>
  <text x="905" y="708" text-anchor="middle" font-size="16" font-family="Arial, sans-serif" fill="#475569">reference result</text>

  <rect x="1090" y="610" width="180" height="130" rx="24" fill="#fee2e2" stroke="#f87171" stroke-width="2" />
  <text x="1180" y="655" text-anchor="middle" font-size="24" font-family="Arial, sans-serif" font-weight="700" fill="#b91c1c">Feedback</text>
  <text x="1180" y="685" text-anchor="middle" font-size="16" font-family="Arial, sans-serif" fill="#7f1d1d">Toast result and</text>
  <text x="1180" y="708" text-anchor="middle" font-size="16" font-family="Arial, sans-serif" fill="#7f1d1d">visual response</text>

  <line x1="320" y1="235" x2="390" y2="235" stroke="#ea580c" stroke-width="4" marker-end="url(#arrow2)" />
  <line x1="610" y1="235" x2="680" y2="235" stroke="#ea580c" stroke-width="4" marker-end="url(#arrow2)" />
  <line x1="900" y1="235" x2="970" y2="235" stroke="#ea580c" stroke-width="4" marker-end="url(#arrow2)" />
  <line x1="1080" y1="290" x2="760" y2="380" stroke="#ea580c" stroke-width="4" marker-end="url(#arrow2)" />

  <line x1="620" y1="500" x2="330" y2="610" stroke="#ea580c" stroke-width="4" marker-end="url(#arrow2)" />
  <line x1="700" y1="500" x2="595" y2="610" stroke="#ea580c" stroke-width="4" marker-end="url(#arrow2)" />
  <line x1="780" y1="500" x2="905" y2="610" stroke="#ea580c" stroke-width="4" marker-end="url(#arrow2)" />

  <line x1="410" y1="675" x2="470" y2="675" stroke="#ea580c" stroke-width="4" marker-end="url(#arrow2)" />
  <line x1="720" y1="675" x2="780" y2="675" stroke="#ea580c" stroke-width="4" marker-end="url(#arrow2)" />
  <line x1="1030" y1="675" x2="1090" y2="675" stroke="#ea580c" stroke-width="4" marker-end="url(#arrow2)" />

  <text x="1180" y="780" text-anchor="middle" font-size="18" font-family="Arial, sans-serif" fill="#7c2d12">
    If output matches expected result -> success toast and confetti
  </text>
  <text x="1180" y="808" text-anchor="middle" font-size="18" font-family="Arial, sans-serif" fill="#7c2d12">
    If not -> failure message and visible output for correction
  </text>
</svg>

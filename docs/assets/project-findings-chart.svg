<svg xmlns="http://www.w3.org/2000/svg" width="1400" height="920" viewBox="0 0 1400 920" role="img" aria-labelledby="title desc">
  <title id="title">Project Findings Chart</title>
  <desc id="desc">A comparison chart summarizing major positive findings and limitation areas in the Talent IQ project.</desc>
  <rect width="1400" height="920" rx="28" fill="#f8fafc"/>
  <text x="700" y="72" text-anchor="middle" font-size="34" font-family="Arial, sans-serif" font-weight="700" fill="#0f172a">Project Findings Comparison Chart</text>
  <text x="700" y="106" text-anchor="middle" font-size="18" font-family="Arial, sans-serif" fill="#475569">Comparison of major strengths and improvement areas in the complete system</text>

  <rect x="90" y="170" width="570" height="650" rx="28" fill="#ecfdf5" stroke="#86efac" stroke-width="2"/>
  <text x="140" y="225" font-size="28" font-family="Arial, sans-serif" font-weight="700" fill="#166534">Major Strengths</text>
  <rect x="130" y="260" width="490" height="88" rx="20" fill="#ffffff" stroke="#bbf7d0" stroke-width="2"/>
  <text x="160" y="312" font-size="21" font-family="Arial, sans-serif" fill="#166534">Integrated workflow across practice, sessions, AI, and resume support</text>
  <rect x="130" y="375" width="490" height="88" rx="20" fill="#ffffff" stroke="#bbf7d0" stroke-width="2"/>
  <text x="160" y="427" font-size="21" font-family="Arial, sans-serif" fill="#166534">Strong protected access and consistent user identity flow</text>
  <rect x="130" y="490" width="490" height="88" rx="20" fill="#ffffff" stroke="#bbf7d0" stroke-width="2"/>
  <text x="160" y="542" font-size="21" font-family="Arial, sans-serif" fill="#166534">AI features use mode-based structure instead of generic chat behavior</text>
  <rect x="130" y="605" width="490" height="88" rx="20" fill="#ffffff" stroke="#bbf7d0" stroke-width="2"/>
  <text x="160" y="657" font-size="21" font-family="Arial, sans-serif" fill="#166534">Resume checker emphasizes evidence-based and conservative review</text>

  <rect x="740" y="170" width="570" height="650" rx="28" fill="#fff7ed" stroke="#fdba74" stroke-width="2"/>
  <text x="790" y="225" font-size="28" font-family="Arial, sans-serif" font-weight="700" fill="#9a3412">Improvement Areas</text>
  <rect x="780" y="260" width="490" height="88" rx="20" fill="#ffffff" stroke="#fed7aa" stroke-width="2"/>
  <text x="810" y="312" font-size="21" font-family="Arial, sans-serif" fill="#9a3412">No formal benchmark suite for project-wide performance metrics</text>
  <rect x="780" y="375" width="490" height="88" rx="20" fill="#ffffff" stroke="#fed7aa" stroke-width="2"/>
  <text x="810" y="427" font-size="21" font-family="Arial, sans-serif" fill="#9a3412">AI quality charts remain internal representations, not benchmark studies</text>
  <rect x="780" y="490" width="490" height="88" rx="20" fill="#ffffff" stroke="#fed7aa" stroke-width="2"/>
  <text x="810" y="542" font-size="21" font-family="Arial, sans-serif" fill="#9a3412">Long-term analytics and learner history can be expanded further</text>
  <rect x="780" y="605" width="490" height="88" rx="20" fill="#ffffff" stroke="#fed7aa" stroke-width="2"/>
  <text x="810" y="657" font-size="21" font-family="Arial, sans-serif" fill="#9a3412">Resume review remains mainly text-focused rather than design-layout-aware</text>
</svg>

<svg xmlns="http://www.w3.org/2000/svg" width="1400" height="920" viewBox="0 0 1400 920" role="img" aria-labelledby="title desc">
  <title id="title">AI Coach Prototype Accuracy Chart</title>
  <desc id="desc">A bar chart representation of prototype evaluation dimensions for the AI Coach module in Talent IQ.</desc>
  <rect width="1400" height="920" rx="28" fill="#fff7ed"/>
  <text x="700" y="72" text-anchor="middle" font-size="34" font-family="Arial, sans-serif" font-weight="700" fill="#9a3412">AI Coach Prototype Evaluation Bar Chart</text>
  <text x="700" y="106" text-anchor="middle" font-size="18" font-family="Arial, sans-serif" fill="#7c2d12">Illustrative internal evaluation view, not a formal benchmark dataset</text>

  <line x1="190" y1="770" x2="1260" y2="770" stroke="#7c2d12" stroke-width="4"/>
  <line x1="190" y1="180" x2="190" y2="770" stroke="#7c2d12" stroke-width="4"/>

  <text x="150" y="775" font-size="18" font-family="Arial, sans-serif" fill="#7c2d12">0</text>
  <text x="138" y="655" font-size="18" font-family="Arial, sans-serif" fill="#7c2d12">20</text>
  <text x="138" y="535" font-size="18" font-family="Arial, sans-serif" fill="#7c2d12">40</text>
  <text x="138" y="415" font-size="18" font-family="Arial, sans-serif" fill="#7c2d12">60</text>
  <text x="138" y="295" font-size="18" font-family="Arial, sans-serif" fill="#7c2d12">80</text>
  <text x="128" y="185" font-size="18" font-family="Arial, sans-serif" fill="#7c2d12">100</text>

  <line x1="190" y1="650" x2="1260" y2="650" stroke="#fed7aa" stroke-width="2"/>
  <line x1="190" y1="530" x2="1260" y2="530" stroke="#fed7aa" stroke-width="2"/>
  <line x1="190" y1="410" x2="1260" y2="410" stroke="#fed7aa" stroke-width="2"/>
  <line x1="190" y1="290" x2="1260" y2="290" stroke="#fed7aa" stroke-width="2"/>
  <line x1="190" y1="170" x2="1260" y2="170" stroke="#fed7aa" stroke-width="2"/>

  <rect x="280" y="260" width="170" height="510" rx="18" fill="#f97316"/>
  <text x="365" y="245" text-anchor="middle" font-size="24" font-family="Arial, sans-serif" font-weight="700" fill="#9a3412">86%</text>
  <text x="365" y="810" text-anchor="middle" font-size="20" font-family="Arial, sans-serif" fill="#7c2d12">Response</text>
  <text x="365" y="838" text-anchor="middle" font-size="20" font-family="Arial, sans-serif" fill="#7c2d12">Relevance</text>

  <rect x="530" y="305" width="170" height="465" rx="18" fill="#fb923c"/>
  <text x="615" y="290" text-anchor="middle" font-size="24" font-family="Arial, sans-serif" font-weight="700" fill="#9a3412">78%</text>
  <text x="615" y="810" text-anchor="middle" font-size="20" font-family="Arial, sans-serif" fill="#7c2d12">Interview</text>
  <text x="615" y="838" text-anchor="middle" font-size="20" font-family="Arial, sans-serif" fill="#7c2d12">Continuity</text>

  <rect x="780" y="350" width="170" height="420" rx="18" fill="#fdba74"/>
  <text x="865" y="335" text-anchor="middle" font-size="24" font-family="Arial, sans-serif" font-weight="700" fill="#9a3412">71%</text>
  <text x="865" y="810" text-anchor="middle" font-size="20" font-family="Arial, sans-serif" fill="#7c2d12">Speech</text>
  <text x="865" y="838" text-anchor="middle" font-size="20" font-family="Arial, sans-serif" fill="#7c2d12">Reliability</text>

  <rect x="1030" y="230" width="170" height="540" rx="18" fill="#ea580c"/>
  <text x="1115" y="215" text-anchor="middle" font-size="24" font-family="Arial, sans-serif" font-weight="700" fill="#9a3412">90%</text>
  <text x="1115" y="810" text-anchor="middle" font-size="20" font-family="Arial, sans-serif" fill="#7c2d12">Fallback</text>
  <text x="1115" y="838" text-anchor="middle" font-size="20" font-family="Arial, sans-serif" fill="#7c2d12">Stability</text>

  <rect x="210" y="120" width="980" height="34" rx="12" fill="#ffffff" stroke="#fdba74" stroke-width="2"/>
  <text x="700" y="143" text-anchor="middle" font-size="15" font-family="Arial, sans-serif" fill="#7c2d12">Interpretation: prototype quality dimensions based on current module behavior and internal validation assumptions</text>
</svg>
